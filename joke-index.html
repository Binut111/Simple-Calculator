<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-style.css">
</head>
<body>
    <div class="container">
        <div class="joke-box">
            <h1>😂 Joke Generator</h1>
            
            <div class="joke-content">
                <p id="joke" class="joke-text">Click the button to get a joke!</p>
            </div>

            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Joke</button>
            </div>

            <div class="joke-type">
                <label for="jokeType">Joke Type:</label>
                <select id="jokeType">
                    <option value="any">Any</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div id="error" class="error hidden"></div>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
